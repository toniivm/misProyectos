services:
  # Multi-service deployment: frontend on Firebase, backend on Render
  # Updated for PayPal, Google Pay, Apple Pay support (2026-05-11)
  - type: web
    name: valtre-frontend
    env: docker
    plan: starter
    autoDeploy: true
    dockerfilePath: Dockerfile
    healthCheckPath: /es
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # Stripe — public key only, safe to expose in frontend
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      # Stripe — secret key for the /api/checkout API route
      - key: STRIPE_SECRET_KEY
        sync: false
      # Firebase client (public)
      - key: NEXT_PUBLIC_FIREBASE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_PROJECT_ID
        sync: false
      - key: NEXT_PUBLIC_FIREBASE_APP_ID
        sync: false
      # Canonical origin used in Stripe redirect URLs
      - key: NEXT_PUBLIC_APP_URL
        value: https://valtre.onrender.com

  - type: web
    name: valtre-backend
    env: docker
    plan: starter
    rootDirectory: server
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SKIP_EXTERNAL
        value: "false"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://valtre.onrender.com,https://valtre-73c7b.web.app,https://valtre-73c7b.firebaseapp.com
      - key: FRONTEND_URL
        value: https://valtre-73c7b.web.app
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
