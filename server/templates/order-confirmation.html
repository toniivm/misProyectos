<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Order Confirmation</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; color:#111; }
      .container { max-width:600px; margin:0 auto; padding:20px; }
      h1 { color:#0b4a6f; }
      .items { margin:16px 0; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Gracias por tu pedido</h1>
      <p>Pedido: <strong>{{orderId}}</strong></p>
      <p>Hola {{customerName}},</p>
      <p>Hemos recibido tu pedido y lo estamos procesando. Aquí tienes los detalles:</p>
      <div class="items">
        {{itemsHtml}}
      </div>
      <p><strong>Total:</strong> {{total}}</p>
      <p>Te enviaremos un email cuando tu pedido tenga número de seguimiento.</p>
      <p>Gracias por confiar en CALMA.</p>
    </div>
  </body>
</html>
