<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Nuevo Pedido — Noctip Admin</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color:#1a1a2e; background:#f7f8fa; margin:0; padding:0; }
      .container { max-width:560px; margin:0 auto; padding:32px 20px; }
      .card { background:#fff; border-radius:16px; padding:32px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
      .logo { font-size:12px; font-weight:800; letter-spacing:0.2em; text-transform:uppercase; color:#6b7280; margin-bottom:24px; }
      h1 { font-size:24px; font-weight:800; color:#0f172a; margin:0 0 8px; }
      .badge { display:inline-block; background:#10b981; color:#fff; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.05em; }
      .order-id { font-size:13px; color:#6b7280; margin-bottom:24px; }
      .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f3f4f6; font-size:14px; }
      .detail-label { color:#6b7280; }
      .detail-value { font-weight:600; color:#0f172a; }
      .items { margin:20px 0; border-top:1px solid #e5e7eb; padding-top:16px; }
      .items ul { list-style:none; padding:0; margin:0; }
      .items li { padding:8px 0; border-bottom:1px solid #f3f4f6; font-size:14px; display:flex; justify-content:space-between; }
      .total { font-size:18px; font-weight:800; color:#0f172a; margin-top:16px; padding-top:16px; border-top:2px solid #e5e7eb; display:flex; justify-content:space-between; }
      .shipping { background:#f0f9ff; border:1px solid #bae6fd; border-radius:12px; padding:16px; margin-top:16px; font-size:13px; color:#0369a1; }
      .footer { margin-top:24px; font-size:11px; color:#9ca3af; text-align:center; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="logo">NOCTIP™ ADMIN</div>
        <h1>🛒 Nuevo pedido</h1>
        <span class="badge">Pendiente</span>
        <div class="order-id">Pedido: <strong>#{{orderId}}</strong></div>
        
        <div class="detail-row">
          <span class="detail-label">Cliente</span>
          <span class="detail-value">{{customerName}}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Email</span>
          <span class="detail-value">{{customerEmail}}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Teléfono</span>
          <span class="detail-value">{{customerPhone}}</span>
        </div>
        
        <div class="items">
          <p style="font-size:12px;font-weight:600;text-transform:uppercase;color:#9ca3af;">Artículos</p>
          {{itemsHtml}}
        </div>
        <div class="total"><span>Total</span><span>{{total}}</span></div>
        
        <div class="shipping">
          <strong>📦 Dirección de envío</strong><br>
          {{shippingAddress}}
        </div>
      </div>
      <div class="footer">Noctip™ Admin · Pedido recibido desde noctip.com</div>
    </div>
  </body>
</html>
