version: '3.8'

services:
  recovery-app:
    build: .
    container_name: recovery-system
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  recovery-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: recovery-backend
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
    env_file:
      - ./server/.env
