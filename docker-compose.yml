version: '3.8'

services:
  flagvibe-app:
    build: .
    container_name: flagvibe-app
    ports:
      - "3000:3000"
    networks:
      - flagvibe-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - valtrex-network

networks:
  flagvibe-network:
    driver: bridge
